services:
  mysql:
    image: mysql:8.0
    container_name: belajar-api-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: belajar_typescript_restful_api
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
    driver: local
